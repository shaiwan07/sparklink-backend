openapi: 3.0.3
info:
  title: Sparklink Dating API
  version: 1.0.0
  description: RESTful API for Sparklink Dating mobile app
servers:
  - url: http://localhost:3000/api
paths:
  /auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
                phone_number:
                  type: string
                full_name:
                  type: string
                language:
                  type: string
              required: [email, password]
      responses:
        '201':
          description: User registered
        '400':
          description: Invalid input
  /auth/login:
    post:
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
              required: [email, password]
      responses:
        '200':
          description: Login successful
        '401':
          description: Invalid credentials
  /users/me:
    get:
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
    put:
      summary: Update current user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name:
                  type: string
                age:
                  type: integer
                gender:
                  type: string
                city:
                  type: string
                bio:
                  type: string
      responses:
        '200':
          description: Profile updated
  /users/me/photos:
    post:
      summary: Upload a profile photo
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                photo:
                  type: string
                  format: binary
      responses:
        '201':
          description: Photo uploaded
  /matches:
    get:
      summary: Get list of potential matches
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of matches
  /matches/{userId}/like:
    post:
      summary: Like a user
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User liked
  /matches/{userId}/dislike:
    post:
      summary: Dislike a user
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User disliked
  /notifications:
    get:
      summary: Get user notifications
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of notifications
  /offers:
    get:
      summary: Get available club/reward offers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of offers
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
